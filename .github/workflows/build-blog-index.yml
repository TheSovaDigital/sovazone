name: Build blog index and RSS feeds

on:
  push:
    branches:
      - main
    paths:
      - "content/blog/*.md"
      - "en/content/blog/*.md"
      - "articles/*.html"
      - "en/articles/*.html"
      - "scripts/generate-blog-index.mjs"
      - "scripts/generate-feeds.mjs"
      - ".github/workflows/build-blog-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate blog indexes
        run: node scripts/generate-blog-index.mjs

      - name: Generate RSS feeds
        run: node scripts/generate-feeds.mjs

      - name: Commit updated indexes and RSS feeds
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update blog indexes and RSS feeds"
          file_pattern: content/blog/index.json en/content/blog/index.json feed.xml rss.xml blog-feed.xml articles-feed.xml en/feed.xml en/rss.xml en/blog-feed.xml en/articles-feed.xml
