backend:
  name: git-gateway
  branch: main

media_folder: "image/blog"
public_folder: "/image/blog"

publish_mode: editorial_workflow

collections:
  - name: "blog"
    label: "Блог"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{category}}"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "Например: instagram-security-tips" }
      - { label: "Дата", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
      - label: "Категория"
        name: "category"
        widget: "select"
        options:
          - "Статьи"
          - "Новости"
          - "Кейсы"
      - { label: "Краткое описание", name: "description", widget: "text" }
      - { label: "Обложка", name: "cover", widget: "image", required: false }
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "text", required: false }
      - { label: "Черновик", name: "draft", widget: "boolean", default: true, required: false }
      - { label: "Текст публикации", name: "body", widget: "markdown" }
