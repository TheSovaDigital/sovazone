backend:
  name: github
  repo: TheSovaDigital/sovazone
  branch: main
  base_url: https://sovazone.vercel.app
  auth_endpoint: api/auth

media_folder: "image/blog"
public_folder: "/image/blog"

publish_mode: editorial_workflow

collections:
  - name: "blog"
    label: "Блог"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"

    fields:
      - { label: "Заголовок", name: "title", widget: "string" }

      - { label: "Slug", name: "slug", widget: "string" }

      - {
          label: "Дата",
          name: "date",
          widget: "datetime",
          format: "YYYY-MM-DD",
          time_format: false
        }

      - label: "Категория"
        name: "category"
        widget: "select"
        options:
          - Статьи
          - Новости
          - Кейсы
        default: Статьи

      - {
          label: "Краткое описание",
          name: "description",
          widget: "text",
          required: false
        }

      - {
          label: "Обложка",
          name: "cover",
          widget: "image",
          required: false
        }

      - {
          label: "Автор",
          name: "author",
          widget: "string",
          required: false,
          default: "SovaZone"
        }

      - {
          label: "Текст публикации",
          name: "body",
          widget: "markdown"
        }
