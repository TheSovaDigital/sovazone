<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>SovaZone Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "TheSovaDigital/sovazone",
          branch: "main",
          base_url: "https://sovazone.vercel.app",
          auth_endpoint: "api/auth"
        },

        media_folder: "image/blog",
        public_folder: "/image/blog",

        publish_mode: "editorial_workflow",

        collections: [
          {
            name: "blog",
            label: "Блог",
            folder: "content/blog",
            create: true,
            slug: "{{slug}}",
            extension: "md",
            format: "frontmatter",
            fields: [
              { label: "Заголовок", name: "title", widget: "string" },
              { label: "Slug", name: "slug", widget: "string" },
              { label: "Дата", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false },
              { label: "Краткое описание", name: "description", widget: "text", required: false },
              { label: "Обложка", name: "cover", widget: "image", required: false },
              { label: "Текст публикации", name: "body", widget: "markdown" }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
