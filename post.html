  <meta name="twitter:image" content="https://sovazone.com/og-twitter.png">

  <link rel="stylesheet" href="/styles.css">

  <style>
    .post-section {
      padding-top: 8px;
    }

    .post-wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .post-breadcrumb {
      max-width: 860px;
      margin: 0 auto 18px;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.72;
    }

    .post-breadcrumb a {
      color: inherit;
      text-decoration: none;
    }

    .post-breadcrumb a:hover {
      opacity: 0.92;
    }

    .post-meta {
      max-width: 860px;
      margin: 0 auto 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.78;
    }

    .post-title {
      max-width: 860px;
      margin: 0 auto 22px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.06;
      letter-spacing: -0.02em;
    }

    .post-cover {
      display: none;
      width: 100%;
      max-width: 860px;
      height: 420px;
      object-fit: cover;
      object-position: center;
      margin: 0 auto 28px;
      border-radius: 18px;
      box-shadow: none !important;
      filter: none !important;
      background: none !important;
    }

    .post-content {
      max-width: 860px;
      margin: 0 auto;
      font-size: 17px;
      line-height: 1.8;
      color: rgba(255,255,255,0.94);
    }

    .post-content h2,
    .post-content h3,
    .post-content h4 {
      margin: 36px 0 14px;
      line-height: 1.18;
      letter-spacing: -0.01em;
      color: #ffffff;
    }

    .post-content h2 {
      font-size: clamp(25px, 3vw, 34px);
    }

    .post-content h3 {
      font-size: clamp(21px, 2.4vw, 28px);
    }

    .post-content h4 {
      font-size: clamp(18px, 2vw, 22px);
    }

    .post-content p {
      margin: 0 0 18px;
    }

    .post-content ul,
    .post-content ol {
      margin: 0 0 18px;
      padding-left: 22px;
    }

    .post-content li {
      margin-bottom: 8px;
    }

    .post-content strong {
      color: #ffffff;
    }

    .post-content a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      word-break: break-word;
    }

    .post-content blockquote {
      margin: 28px 0;
      padding: 18px 20px;
      border-left: 2px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.02);
      border-radius: 0 14px 14px 0;
      opacity: 0.95;
    }

    .post-content hr {
      border: 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 34px 0;
    }

    .post-content img {
      display: block;
      width: 100%;
      max-width: 860px;
      height: 420px;
      object-fit: cover;
      object-position: center;
      margin: 28px auto;
      border-radius: 18px;
      box-shadow: none !important;
      filter: none !important;
      background: none !important;
    }

    .post-content img + em,
    .post-content p > em:only-child {
      display: block;
      margin: -8px auto 22px;
      max-width: 860px;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.7;
      font-style: normal;
      text-align: center;
    }

    .post-state {
      max-width: 860px;
      margin: 0 auto;
      font-size: 17px;
      line-height: 1.75;
      opacity: 0.86;
    }

    @media (max-width: 900px) {
      .post-section {
        padding-top: 0;
      }

      .post-cover,
      .post-content img {
        height: 260px;
        border-radius: 16px;
      }

      .post-content {
        font-size: 16px;
        line-height: 1.75;
      }

      .post-meta {
        gap: 8px 14px;
      }
    }
  </style>

  <script type="application/ld+json" id="schema-breadcrumb">
  {
    "@context":"https://schema.org",

      {
        "@type":"ListItem",

        "item":"https://sovazone.com/post.html"
      }
    ]
  }
  </script>

  <script type="application/ld+json" id="schema-article">
  {
    "@context":"https://schema.org",
    "@type":"Article",
    "headline":"Статья — SovaZone",
    "description":"Статья блога SovaZone. Новости, инструкции и кейсы по аккаунтам и никнеймам.",
    "image":["https://sovazone.com/og-image.png"],
    "mainEntityOfPage":"https://sovazone.com/post.html",
    "author":{
      "@type":"Organization",
      "name":"SovaZone"
    },
    "publisher":{
      "@type":"Organization",
      "name":"SovaZone",
      "url":"https://sovazone.com/",
      "logo":{
        "@type":"ImageObject",
        "url":"https://sovazone.com/android-chrome-512x512.png"
      }
    },
    "datePublished":"2026-04-07",
    "dateModified":"2026-04-07"
  }
  </script>
</head>
<body>
  <div class="site-shell">
    <div id="header-placeholder"></div>

    <main class="page-content">
      <div class="container">
        <section class="section post-section">
          <article class="post-wrap" itemscope itemtype="https://schema.org/Article">
            <div class="post-breadcrumb">
              <a href="/index.html">Главная</a> / <a href="/blog.html">Блог</a> / <span id="post-breadcrumb-current">Статья</span>
            </div>

            <div class="post-meta">
              <div>Опубликовано: <span id="post-date" itemprop="datePublished">—</span></div>
              <div>Автор: <span id="post-author" itemprop="author">SovaZone</span></div>
              <div>Категория: <span id="post-category">Блог</span></div>
            </div>

            <h1 class="post-title" id="post-title" itemprop="headline">Загрузка...</h1>

            <img id="post-cover" class="post-cover" src="" alt="Обложка статьи" itemprop="image">

            <div id="post-content" class="post-content post-state" itemprop="articleBody">Загружаем статью...</div>
          </article>
        </section>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

  <script>
    const BLOG_REPO_OWNER = "TheSovaDigital";
    const BLOG_REPO_NAME = "sovazone";
    const BLOG_REPO_BRANCH = "main";

    function getSlug() {
      const params = new URLSearchParams(window.location.search);
      return (params.get("slug") || "").trim();
    }

    function formatDate(value) {
      if (!value) return "—";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString("ru-RU", {
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function parseFrontmatter(text) {
      if (!text.startsWith("---")) {
        return { meta: {}, content: text };
      }

      const match = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n?([\s\S]*)$/);
      if (!match) {
        return { meta: {}, content: text };
      }

      let meta = {};
      try {
        meta = jsyaml.load(match[1]) || {};
      } catch (e) {
        meta = {};
      }

      return {
        meta: meta,
        content: match[2] || ""
      };
    }

    async function fetchPostMarkdown(slug) {
      const cacheBust = Date.now();
      const attempts = [
        "/content/blog/" + encodeURIComponent(slug) + ".md?v=" + cacheBust,
        "https://cdn.jsdelivr.net/gh/" + BLOG_REPO_OWNER + "/" + BLOG_REPO_NAME + "@" + BLOG_REPO_BRANCH + "/content/blog/" + encodeURIComponent(slug) + ".md?v=" + cacheBust,
        "https://raw.githubusercontent.com/" + BLOG_REPO_OWNER + "/" + BLOG_REPO_NAME + "/" + BLOG_REPO_BRANCH + "/content/blog/" + encodeURIComponent(slug) + ".md?v=" + cacheBust
      ];

      for (const url of attempts) {
        try {
          const response = await fetch(url, { cache: "no-store" });
          if (response.ok) {
            return await response.text();
          }
        } catch (e) {}
      }

      throw new Error("POST_NOT_FOUND");
    }

    function setMeta(selector, value) {
      const node = document.querySelector(selector);
      if (node) {
        node.setAttribute("content", value);
      }
    }

    function setLink(selector, value) {
      const node = document.querySelector(selector);
      if (node) {
        node.setAttribute("href", value);
      }
    }

    function applySeo(meta, slug, formattedDate) {
      const title = meta.title ? meta.title + " — SovaZone" : "Статья — SovaZone";
      const description = meta.description || "Статья блога SovaZone.";
      const canonical = "https://sovazone.com/post.html?slug=" + encodeURIComponent(slug);
      const image = meta.cover ? "https://sovazone.com" + meta.cover : "https://sovazone.com/og-image.png";
      const published = meta.date || "2026-04-07";
      const modified = meta.updated || meta.date || published;
      const authorName = meta.author || "SovaZone";

      document.title = title;
      setMeta('meta[name="description"]', description);
      setMeta('meta[name="keywords"]', (meta.keywords || "SovaZone блог, блог SovaZone, новости SovaZone, кейсы аккаунтов, никнеймы, digital-проекты, помощь с аккаунтами"));
      setLink('link[rel="canonical"]', canonical);

      setMeta('meta[property="og:title"]', title);
      setMeta('meta[property="og:description"]', description);
      setMeta('meta[property="og:url"]', canonical);
      setMeta('meta[property="og:image"]', image);
      setMeta('meta[property="og:image:secure_url"]', image);

      setMeta('meta[name="twitter:title"]', title);
      setMeta('meta[name="twitter:description"]', description);
      setMeta('meta[name="twitter:image"]', image);

      const breadcrumbSchema = {
        "@context":"https://schema.org",
        "@type":"BreadcrumbList",
        "itemListElement":[
          {
            "@type":"ListItem",
            "position":1,
            "name":"Главная",
            "item":"https://sovazone.com/"
          },
          {
            "@type":"ListItem",
            "position":2,
            "name":"Блог",
            "item":"https://sovazone.com/blog.html"
          },
          {
            "@type":"ListItem",
            "position":3,
            "name": meta.title || "Статья",
            "item": canonical
          }
        ]
      };

      const articleSchema = {
        "@context":"https://schema.org",
        "@type":"Article",
        "headline": meta.title || "Статья — SovaZone",
        "description": description,
        "image": [image],
        "mainEntityOfPage": canonical,
        "author": {
          "@type":"Organization",
          "name": authorName
        },
        "publisher": {
          "@type":"Organization",
          "name":"SovaZone",
          "url":"https://sovazone.com/",
          "logo":{
            "@type":"ImageObject",
            "url":"https://sovazone.com/android-chrome-512x512.png"
          }
        },
        "datePublished": published,
        "dateModified": modified
      };

      document.getElementById("schema-breadcrumb").textContent = JSON.stringify(breadcrumbSchema, null, 2);
      document.getElementById("schema-article").textContent = JSON.stringify(articleSchema, null, 2);
    }

    async function loadPost() {
      const slug = getSlug();
      const contentEl = document.getElementById("post-content");

      if (!slug) {
        document.getElementById("post-title").textContent = "Статья не найдена";
        contentEl.textContent = "В ссылке не передан slug статьи.";
        return;
      }

      try {
        const raw = await fetchPostMarkdown(slug);
        const parsed = parseFrontmatter(raw);
        const meta = parsed.meta || {};
        const markdown = parsed.content || "";

        const title = meta.title || "Статья";
        const formattedDate = formatDate(meta.date || "");
        const author = meta.author || "SovaZone";
        const category = meta.category || "Блог";

        document.getElementById("post-title").textContent = title;
        document.getElementById("post-breadcrumb-current").textContent = title;
        document.getElementById("post-date").textContent = formattedDate;
        document.getElementById("post-author").textContent = author;
        document.getElementById("post-category").textContent = category;

        if (meta.cover) {
          const coverEl = document.getElementById("post-cover");
          coverEl.src = meta.cover;
          coverEl.alt = title;
          coverEl.style.display = "block";
        }

        contentEl.classList.remove("post-state");
        contentEl.innerHTML = marked.parse(markdown);

        applySeo(meta, slug, formattedDate);
      } catch (error) {
        document.getElementById("post-title").textContent = "Статья не найдена";
        contentEl.classList.add("post-state");
        contentEl.textContent = "Пост не загрузился ни с сайта, ни из GitHub CDN. Проверь путь к markdown-файлу, наличие файла в репозитории и завершение деплоя.";
      }
    }

    loadPost();
  </script>
</body>
</html>
