  <style>

  .article-wrapper {
    max-width: 900px;

  }

  .breadcrumb {

    opacity: 0.7;
    margin-bottom: 20px;
  }

  .article-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;

    margin-bottom: 16px;
  }

  .article-title {
    font-size: 32px;
    margin-bottom: 20px;
  }

  .article-content {
    line-height: 1.7;

  }

  .article-content img {
    max-width: 100%;
    border-radius: 12px;
    margin: 24px 0;
  }

  </style>

</head>

<body>

<div class="site-shell">

  <div id="header-placeholder"></div>

  <main class="page-content">

    <div class="container">

      <div class="article-wrapper">

        <div class="breadcrumb">
          Главная / Блог / <span id="post-title-breadcrumb">Статья</span>
        </div>

        <div class="article-meta">

          <div>
            Опубликовано:
            <span id="post-date">—</span>
          </div>

          <div>
            Автор:
            <span id="post-author">SovaZone</span>
          </div>

          <div>
            Категория:
            <span id="post-category">Блог</span>
          </div>

        </div>

        <h1 class="article-title" id="post-title">
          Загрузка...
        </h1>

        <div class="article-content" id="post-content">
          Загружаем статью...
        </div>

      </div>

    </div>

  </main>

  <div id="footer-placeholder"></div>

</div>

<script src="/script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

<script>

function getSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get("slug");
}

async function loadPost() {

  const slug = getSlug();

  if (!slug) {
    document.getElementById("post-content").innerHTML =
      "Статья не найдена.";
    return;
  }

  try {

    const response = await fetch(
      "/content/blog/" + slug + ".md"
    );

    if (!response.ok) {
      document.getElementById("post-content").innerHTML =
        "Статья не найдена.";
      return;
    }

    const text = await response.text();

    const parts = text.split("---");

    let meta = {};
    let content = text;

    if (parts.length > 2) {

      meta = jsyaml.load(parts[1]);
      content = parts.slice(2).join("---");

    }

    document.getElementById("post-title").textContent =
      meta.title || "Статья";

    document.getElementById(
      "post-title-breadcrumb"
    ).textContent =
      meta.title || "Статья";

    document.getElementById("post-date").textContent =
      meta.date || "—";

    document.getElementById("post-author").textContent =
      meta.author || "SovaZone";

    document.getElementById("post-category").textContent =
      meta.category || "Блог";

    document.getElementById("post-content").innerHTML =
      marked.parse(content);

  }

  catch (error) {

    document.getElementById("post-content").innerHTML =
      "Ошибка загрузки статьи.";

  }

}

loadPost();

</script>

</body>
