<header class="sz-header">
  <style>
    .sz-header__lang{display:flex;align-items:center;margin-left:14px}
    .sz-lang-toggle{
      display:inline-flex;align-items:center;gap:2px;padding:3px;
      border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);border-radius:999px
    }
    .sz-lang-toggle__link,
    .sz-lang-toggle__current{
      min-width:42px;height:28px;padding:0 12px;display:inline-flex;align-items:center;justify-content:center;
      border-radius:999px;font-size:12px;line-height:1;text-decoration:none;color:rgba(255,255,255,.72);
      transition:background .18s ease,color .18s ease
    }
    .sz-lang-toggle__link:hover{color:#fff;background:rgba(255,255,255,.05)}
    .sz-lang-toggle__current{color:#fff;background:rgba(255,255,255,.08);pointer-events:none;font-weight:700}
    .sz-side__lang-inline{display:none}
    @media (max-width:980px){.sz-header__lang{display:none}}
    @media (max-width:900px){
      .sz-side__head{
        justify-content:space-between;
        align-items:center;
        gap:12px;
      }
      .sz-side__lang-inline{
        display:flex;
        align-items:center;
        flex:0 0 auto;
        margin-left:auto;
      }
      .sz-side__lang-inline .sz-lang-toggle{
        max-width:100%;
      }
      .sz-side__lang-inline .sz-lang-toggle__link,
      .sz-side__lang-inline .sz-lang-toggle__current{
        min-width:40px;
        height:30px;
        padding:0 10px;
      }
      .sz-side__group--language{
        display:none;
      }
    }
  </style>
  <div class="container sz-header__inner">
    <a class="sz-header__brand" href="/en/index.html" aria-label="SovaZone — home">
      <span class="sz-header__brand-text">SovaZone</span>
    </a>

    <nav class="sz-header__nav" aria-label="Main navigation">
      <a class="sz-header__link" href="/en/index.html">Home</a>
      <a class="sz-header__link" href="/en/services.html">Services</a>
      <a class="sz-header__link" href="/en/usernames.html">Usernames</a>
      <a class="sz-header__link" href="/en/blog.html">Blog</a>

      <a class="sz-header__store" href="https://sovads.ru/" target="_blank" rel="noopener">
        <span>Online store</span>
        <svg class="sz-header__ext" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
          <path d="M7 5h8v8" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M15 5 5 15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </a>
    </nav>

    <div class="sz-header__lang" aria-label="Language switch">
      <div class="sz-lang-toggle" role="group" aria-label="Language switch">
        <a class="sz-lang-toggle__link" data-lang-target="ru" href="/index.html" lang="ru" hreflang="ru">RU</a>
        <span class="sz-lang-toggle__current" data-lang-current="en" lang="en" aria-current="page">EN</span>
      </div>
    </div>

    <button
      class="sz-header__burger"
      type="button"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="sz-side-menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div class="sz-overlay" id="sz-overlay" hidden></div>

  <aside class="sz-side" id="sz-side-menu" aria-hidden="true">
    <div class="sz-side__head">
      <div class="sz-side__title">Menu</div>
      <div class="sz-side__lang-inline" aria-label="Language switch">
        <div class="sz-lang-toggle" role="group" aria-label="Language switch">
          <a class="sz-lang-toggle__link" data-lang-target="ru" href="/index.html" lang="ru" hreflang="ru">RU</a>
          <span class="sz-lang-toggle__current" data-lang-current="en" lang="en" aria-current="page">EN</span>
        </div>
      </div>
    </div>

    <div class="sz-side__body">
      <div class="sz-side__group sz-side__group--primary">
        <div class="sz-side__group-title">Main</div>
        <a class="sz-side__link" href="/en/index.html">Home</a>
        <a class="sz-side__link" href="/en/services.html">Services</a>
        <a class="sz-side__link" href="/en/usernames.html">Usernames</a>
        <a class="sz-side__link" href="/en/blog.html">Blog</a>
        <a class="sz-side__link" href="https://sovads.ru/" target="_blank" rel="noopener">
          <span>Online store</span>
          <svg class="sz-side__ext" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
            <path d="M7 5h8v8" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M15 5 5 15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </a>
      </div>

      <div class="sz-side__group">
        <div class="sz-side__group-title">Sections</div>
        <a class="sz-side__link" href="/en/projects.html">Projects</a>
        <a class="sz-side__link" href="/en/articles.html">Articles</a>
      </div>

      <div class="sz-side__group">
        <div class="sz-side__group-title">Information</div>
        <a class="sz-side__link" href="/en/about.html">About</a>
        <a class="sz-side__link" href="/en/how-to-buy.html">How to buy</a>
        <a class="sz-side__link" href="/en/sell.html">How to sell</a>
        <a class="sz-side__link" href="/en/contacts.html">Contacts</a>
        <a class="sz-side__link" href="/en/guarantees.html">Guarantees</a>
        <a class="sz-side__link" href="/en/faq.html">FAQ</a>
      </div>

      <div class="sz-side__group sz-side__group--language">
        <div class="sz-side__group-title">Language</div>
        <div class="sz-lang-toggle" role="group" aria-label="Language switch">
          <a class="sz-lang-toggle__link sz-side__link" data-lang-target="ru" href="/index.html" lang="ru" hreflang="ru">RU</a>
          <span class="sz-lang-toggle__current" data-lang-current="en" lang="en" aria-current="page">EN</span>
        </div>
      </div>
    </div>
  </aside>
</header>
