  <style>
    .error404-page{
      position:relative;
      overflow:hidden;
      min-height:calc(100vh - 56px);
      isolation:isolate;
      background:
        radial-gradient(900px 500px at 0% 10%, rgba(105, 18, 52, .26), transparent 58%),
        radial-gradient(800px 540px at 100% 18%, rgba(24, 56, 155, .22), transparent 58%),
        radial-gradient(540px 340px at 50% 45%, rgba(102, 54, 170, .12), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)),
        #060610;
    }

    .error404-page::before{
      content:"";
      position:absolute;
      inset:-10%;
      pointer-events:none;
      background:
        radial-gradient(circle at 28% 26%, rgba(255, 88, 155, .10), transparent 18%),
        radial-gradient(circle at 74% 22%, rgba(113, 128, 255, .11), transparent 18%),
        radial-gradient(circle at 60% 70%, rgba(198, 78, 255, .07), transparent 18%);
      filter:blur(50px);
      animation:error404Aurora 12s ease-in-out infinite alternate;
      z-index:-3;
    }

    .error404-page::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:radial-gradient(circle at 50% 46%, rgba(0,0,0,.9), transparent 82%);
      opacity:.18;
      z-index:-2;
    }

    .error404-orb{
      position:absolute;
      inset:auto;
      left:50%;
      top:45%;
      width:880px;
      height:880px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:radial-gradient(circle, rgba(130,86,255,.12) 0%, rgba(130,86,255,0) 66%);
      filter:blur(44px);
      animation:error404Pulse 6s ease-in-out infinite;
      pointer-events:none;
      z-index:-1;
    }

    .error404-wrap{
      min-height:calc(100vh - 140px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:30px 0 56px;
    }

    .error404-stage{
      width:min(100%, 1100px);
      text-align:center;
      padding:28px 18px;
      position:relative;
    }

    .error404-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:#d8d8e8;
      font-size:13px;
      line-height:1;
      margin-bottom:20px;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .error404-number{
      position:relative;
      z-index:1;
      margin:0;
      font-size:clamp(140px, 28vw, 360px);
      line-height:.82;
      letter-spacing:-.11em;
      font-weight:900;
      background:linear-gradient(90deg, #f1deff 0%, #cf84ff 28%, #ff5ca8 64%, #f77737 100%);
      background-size:160% 160%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      -webkit-text-fill-color:transparent;
      filter:drop-shadow(0 16px 40px rgba(0,0,0,.18));
      user-select:none;
      animation:error404Gradient 7s ease-in-out infinite, error404Float 5s ease-in-out infinite;
    }

    .error404-bubble{
      position:absolute;
      top:136px;
      right:8px;
      z-index:4;
      display:inline-flex;
      align-items:center;
      min-height:42px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(14, 16, 34, .88);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      color:#fff;
      font-size:14px;
      line-height:1;
      letter-spacing:-.01em;
      transform:rotate(-8deg);
      box-shadow:
        0 16px 36px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.05);
      white-space:nowrap;
    }

    .error404-bubble strong{
      font-weight:800;
      margin-left:6px;
      background:linear-gradient(90deg, #f1deff 0%, #cf84ff 32%, #ff5ca8 70%, #f77737 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      -webkit-text-fill-color:transparent;
    }

    .error404-title{
      margin:10px auto 0;
      max-width:820px;
      color:#fff;
      font-size:clamp(28px, 4vw, 54px);
      line-height:1.02;
      letter-spacing:-.05em;
      text-wrap:balance;
    }

    .error404-sub{
      margin:16px auto 0;
      max-width:500px;
      color:rgba(255,255,255,.72);
      font-size:16px;
      line-height:1.7;
      text-wrap:balance;
    }

    .error404-actions{
      display:flex;
      justify-content:center;
      margin-top:24px;
    }

    .error404-main{
      min-width:220px;
      min-height:48px;
      padding:0 22px;
      border:none;
      border-radius:999px;
      background:linear-gradient(90deg,#833ab4 0%,#c13584 38%,#e1306c 68%,#f77737 100%);
      color:#fff;
      font-size:14px;
      font-weight:800;
      line-height:1;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 18px 36px rgba(0,0,0,.18);
      transition:transform .18s ease, filter .18s ease, box-shadow .18s ease;
    }

    .error404-main:hover{
      transform:translateY(-2px);
      filter:brightness(1.04);
      color:#fff;
      box-shadow:0 22px 42px rgba(0,0,0,.22);
    }

    @keyframes error404Gradient{
      0%{
        background-position:0% 50%;
      }
      50%{
        background-position:100% 50%;
      }
      100%{
        background-position:0% 50%;
      }
    }

    @keyframes error404Float{
      0%, 100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-8px);
      }
    }

    @keyframes error404Pulse{
      0%, 100%{
        opacity:.78;
        transform:translate(-50%,-50%) scale(1);
      }
      50%{
        opacity:1;
        transform:translate(-50%,-50%) scale(1.06);
      }
    }

    @keyframes error404Aurora{
      0%{
        transform:translate3d(0, 0, 0) scale(1);
      }
      50%{
        transform:translate3d(1.5%, -1.5%, 0) scale(1.04);
      }
      100%{
        transform:translate3d(-1.5%, 1.5%, 0) scale(1.02);
      }
    }

    @media (max-width: 980px){
      .error404-bubble{
        right:-6px;
      }
    }

    @media (max-width: 760px){
      .error404-wrap{
        min-height:auto;
        padding:20px 0 40px;
      }

      .error404-stage{
        padding:10px 4px 10px;
      }

      .error404-number{
        font-size:clamp(120px, 40vw, 190px);
      }

      .error404-bubble{
        position:static;
        margin:0 auto 14px;
        transform:rotate(-4deg);
      }

      .error404-title{
        margin-top:6px;
        font-size:31px;
      }

      .error404-sub{
        margin-top:14px;
        font-size:14px;
        line-height:1.62;
      }

      .error404-main{
        width:100%;
        max-width:320px;
      }

      .error404-orb{
        width:620px;
        height:620px;
        top:42%;
      }
    }
  </style>
