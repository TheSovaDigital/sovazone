  <meta name="twitter:description" content="Страница не найдена. Вернитесь на главную SovaZone или откройте нужный раздел.">
  <meta name="twitter:image" content="https://sovazone.com/og-twitter.png">

  <style>
    .error404-min{
      position:relative;
      overflow:hidden;
      min-height:calc(100vh - 56px);
      isolation:isolate;
    }

    .error404-min::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(560px 360px at 12% 12%, rgba(109,26,47,.18), transparent 62%),
        radial-gradient(700px 420px at 88% 18%, rgba(35,58,154,.16), transparent 68%);
      z-index:-2;
    }

    .error404-min::after{
      content:"";
      position:absolute;
      left:50%;
      top:48%;
      width:880px;
      height:880px;
      transform:translate(-50%,-50%);
      background:radial-gradient(circle, rgba(130,86,255,.10) 0%, rgba(130,86,255,0) 66%);
      filter:blur(46px);
      pointer-events:none;
      z-index:-1;
    }

    .error404-wrap{
      min-height:calc(100vh - 140px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 0 56px;
    }

    .error404-stage{
      width:min(100%, 1040px);
      text-align:center;
      padding:22px 18px;
      position:relative;
    }

    .error404-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:#d8d8e8;
      font-size:13px;
      line-height:1;
      margin-bottom:18px;
    }

    .error404-number{
      margin:0;
      font-size:clamp(130px, 26vw, 340px);
      line-height:.82;
      letter-spacing:-.11em;
      font-weight:900;
      background:linear-gradient(90deg, #f1deff 0%, #cf84ff 28%, #ff5ca8 64%, #f77737 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      -webkit-text-fill-color:transparent;
      filter:drop-shadow(0 14px 40px rgba(0,0,0,.18));
      user-select:none;
    }

    .error404-bubble{
      position:absolute;
      top:88px;
      right:110px;
      display:inline-flex;
      align-items:center;
      min-height:38px;
      padding:0 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      color:#fff;
      font-size:14px;
      line-height:1;
      letter-spacing:-.01em;
      transform:rotate(-8deg);
      box-shadow:0 14px 34px rgba(0,0,0,.16);
      white-space:nowrap;
    }

    .error404-bubble strong{
      font-weight:800;
      margin-left:6px;
      background:linear-gradient(90deg, #f1deff 0%, #cf84ff 32%, #ff5ca8 70%, #f77737 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      -webkit-text-fill-color:transparent;
    }

    .error404-title{
      margin:8px auto 0;
      max-width:760px;
      color:#fff;
      font-size:clamp(28px, 4vw, 52px);
      line-height:1.02;
      letter-spacing:-.05em;
      text-wrap:balance;
    }

    .error404-sub{
      margin:14px auto 0;
      max-width:540px;
      color:rgba(255,255,255,.68);
      font-size:15px;
      line-height:1.72;
    }

    .error404-actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      margin-top:24px;
    }

    .error404-main{
      min-width:210px;
      min-height:46px;
      padding:0 22px;
      border:none;
      border-radius:999px;
      background:linear-gradient(90deg,#833ab4 0%,#c13584 38%,#e1306c 68%,#f77737 100%);
      color:#fff;
      font-size:14px;
      font-weight:800;
      line-height:1;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 16px 34px rgba(0,0,0,.18);
      transition:transform .18s ease, filter .18s ease;
    }

    .error404-main:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
      color:#fff;
    }

    .error404-micro{
      margin-top:18px;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:14px;
    }

    .error404-micro a{
      color:rgba(255,255,255,.58);
      font-size:13px;
      line-height:1;
      text-decoration:none;
      transition:color .18s ease;
    }

    .error404-micro a:hover{
      color:#fff;
    }

    @media (max-width: 900px){
      .error404-bubble{
        right:40px;
      }
    }

    @media (max-width: 760px){
      .error404-wrap{
        min-height:auto;
        padding:20px 0 40px;
      }

      .error404-stage{
        padding:10px 4px 8px;
      }

      .error404-number{
        font-size:clamp(116px, 38vw, 180px);
      }

      .error404-bubble{
        position:static;
        margin:0 auto 14px;
        transform:rotate(-4deg);
      }

      .error404-title{
        margin-top:4px;
        font-size:31px;
      }

      .error404-sub{
        font-size:14px;
        line-height:1.62;
      }

      .error404-actions{
        margin-top:20px;
      }

      .error404-main{
        width:100%;
        max-width:320px;
      }

      .error404-micro{
        gap:10px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <div id="header-placeholder"></div>

    <main class="page-content error404-min">
      <div class="container">
        <section class="error404-wrap">
          <div class="error404-stage">
            <div class="error404-chip">Страница не найдена</div>
            <div class="error404-bubble">потерялся даже <strong>@username</strong></div>
            <h1 class="error404-number">404</h1>
            <h2 class="error404-title">Кажется, эта ссылка ушла в тень</h2>
            <p class="error404-sub">Но нужный раздел всё ещё рядом. Возвращайся на главную или открой что-то полезное одной кнопкой ниже.</p>

            <div class="error404-actions">
              <a class="error404-main" href="/index.html">Вернуться на главную</a>
            </div>

            <div class="error404-micro">
              <a href="/usernames.html">Никнеймы</a>
              <a href="/services.html">Услуги</a>
              <a href="/blog.html">Блог</a>
              <a href="/contacts.html">Контакты</a>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
